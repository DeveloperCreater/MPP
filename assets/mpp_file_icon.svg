<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Document -->
  <g filter="url(#shadow)">
    <path d="M112 64h200l88 88v296a32 32 0 0 1-32 32H112a32 32 0 0 1-32-32V96a32 32 0 0 1 32-32z"
          fill="url(#paper)" stroke="#0ea5e9" stroke-width="6" />
    <!-- Fold -->
    <path d="M312 64v88a32 32 0 0 0 32 32h88"
          fill="url(#fold)" />
    <path d="M312 64l120 120" stroke="#38bdf8" stroke-width="6" opacity="0.7"/>
  </g>

  <!-- M++ text -->
  <g>
    <text x="256" y="320"
          text-anchor="middle"
          font-family="Segoe UI, Inter, Arial, sans-serif"
          font-size="120"
          font-weight="800"
          fill="#ffffff"
          letter-spacing="-2">M++</text>
    <!-- Accent underline -->
    <rect x="164" y="350" width="184" height="10" rx="5" fill="#0ea5e9"/>
  </g>
</svg>

