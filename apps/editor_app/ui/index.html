<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M++ Editor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">M++ Editor</div>
        <div class="spacer"></div>
        <button id="btnHello" class="btn">Call M++ hello()</button>
        <button id="btnStats" class="btn">Call M++ stats()</button>
        <button id="btnClear" class="btn danger">Clear</button>
      </header>

      <main class="main">
        <section class="left">
          <div class="label">Code / Text</div>
          <textarea id="editor" class="editor" spellcheck="false">// Type here...</textarea>
        </section>
        <section class="right">
          <div class="label">Output</div>
          <pre id="output" class="output"></pre>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
